ion through literature synthesis, contradiction-checking, and structured reference document generation: the user should NOT need to manually find or upload PDFs.","title":"Paper Research Workflow","summary":"A structured workflow for converting analysis findings into a rich, verified reference document suitable for manuscript drafting. Designed for empirical scientists. Outputs a structured `.md` reference document organized by paper section, with sourced claims, confidence tags,...","size_bytes":75339,"mtime":"2026-05-27T01:16:38.243Z"},{"name":"research-iterate","category":"workflows","path":"skills/workflows/research-iterate/SKILL.md","frontmatter_name":"research-iterate","description":"Iteratively refines a research analysis through multi-specialist critique and quality gates until it reaches publication-ready quality. Use this skill when the user says: \"iterate the analysis\", \"refine until publication-ready\", \"run through quality gates\", \"bring this to publication quality\", or asks for a defensible, multi-round refinement of existing outputs. The skill orchestrates the Lab Director + specialist agents through a six-phase loop (readiness assessment, planning, implementation, parallel critique, arbitration, and self-update) until the project's concrete goal spec is met, escalating to the user only on structural decisions. Wraps `analysis-pipeline` as a sub-workflow for code-heavy rounds; adds cross-domain critique, render-and-read visualization review, and self-improvement feedback into the framework itself.","title":"Research Iterate Skill","summary":"A structured, multi-round orchestration loop that takes a research analysis from \"first cut\" to \"publication ready\" by running it through parallel specialist critique, explicit quality gates, and self-improvement feedback cycles.","size_bytes":18477,"mtime":"2026-05-27T01:16:38.243Z"},{"name":"reviewer-reply-pipeline","category":"workflows","path":"skills/workflows/reviewer-reply-pipeline/SKILL.md","frontmatter_name":"reviewer-reply-pipeline","description":"Orchestrates the end-to-end reviewer-reply workflow from raw reviewer comments to a submission-ready response document and tracked-changes manuscript. Chains reviewer-reply-planning and reviewer-reply-drafting in sequence, manages state, and coordinates handoffs. Use this skill whenever the user wants to run the full reply workflow, resume from a checkpoint, redraft individual comments, or check status. Trigger phrases include \"address the reviewer comments\", \"respond to the reviewers\", \"where are we on the reply\", \"redraft my reply to R2-C3\", \"build the final reply docx\", or \"resume the reply workflow\". The orchestrator manages a JSON state file alongside the manuscript and supports targeted re-entry on individual comments without redrafting the whole reply.","title":"Reviewer Reply Pipeline: Orchestrator","summary":"Lightweight workflow coordinator for the end-to-end reviewer-reply lifecycle. Chains two primary skills while keeping each independently usable.","size_bytes":19095,"mtime":"2026-05-27T01:16:38.243Z"}]},"agents":{"core":[{"name":"acoustic-telemetry-specialist","file":"acoustic-telemetry-specialist.md","path":"agents/acoustic-telemetry-specialist.md","frontmatter_name":"acoustic-telemetry-specialist","description":"Subject expert for acoustic telemetry studies of marine fish (tarpon, cobia, bonefish, sharks, sea turtles) and related taxa. Use whenever a request involves receiver array design, VPS positioning, detection probability, range testing, tag retention or shedding, residency / dispersal analyses, cooperative networks (FACT, iTAG, OTN, ACT), or interpretation of detection histories. Always paired with the Quantitative Scientist when statistical analysis is involved.","title":"Acoustic Telemetry Specialist: Agent Definition","summary":"You are a marine field ecologist with deep operational and analytical experience in acoustic-telemetry studies of large-bodied recreational species (Atlantic tarpon, common snook, permit, cobia, bonefish), elasmobranchs, and sea turtles. You think first in terms of the detecti...","size_bytes":8637,"mtime":"2026-05-27T01:33:39.556Z"},{"name":"extraction-validator","file":"extraction-validator.md","path":"agents/extraction-validator.md","frontmatter_name":"extraction-validator","description":"Source-faithfulness verification. Audits extracted values against original sources to catch hallucination, misread values, page-number errors, and out-of-context citations. Use after literature-extractor or for manuscript citation auditing. Must run in a separate context from the extraction.","title":"Extraction Validator: Agent Definition","summary":"You are a scientific fact-checker with deep skepticism for any value that has not been verified against its primary source. You assume errors exist until proven otherwise. You are not the original extractor: you read each entry in the extraction log fresh and ask: does this va...","size_bytes":13531,"mtime":"2026-05-27T01:16:38.234Z"},{"name":"fisheries-stock-management-specialist","file":"fisheries-stock-management-specialist.md","path":"agents/fisheries-stock-management-specialist.md","frontmatter_name":"fisheries-stock-management-specialist","description":"Subject expert for fisheries stock structure, stock assessment context, catch-and-release physiology and survival, and management framing (SEDAR, NOAA, GMFMC, SAFMC, ASMFC, state agencies). Use whenever a request involves linking telemetry, movement, or distribution findings to fishery management; interpreting stock-assessment context; designing or critiquing C&R-survival studies; or framing recreational-fishery implications for a management audience. Always paired with the Acoustic Telemetry Specialist and/or Quantitative Scientist when analysis is involved.","title":"Fisheries Stock & Management Specialist: Agent Definition","summary":"You are a fisheries scientist with operational experience in the U.S. Atlantic, Gulf of Mexico, and Caribbean recreational and commercial fishery systems. You know the actual management context for the lab's primary taxa: Atlantic tarpon (state-managed catch-and- release fishe...","size_bytes":8735,"mtime":"2026-05-27T01:35:18.666Z"},{"name":"geospatial-environmental-data-specialist","file":"geospatial-environmental-data-specialist.md","path":"agents/geospatial-environmental-data-specialist.md","frontmatter_name":"geospatial-environmental-data-specialist","description":"Subject expert for marine environmental data acquisition, processing, and integration into ecological models. Use whenever a request involves downloading, projecting, regridding, cropping, or extracting environmental variables (SST, salinity, currents, bathymetry, chlorophyll, mixed-layer depth, distance-to-coast) from products like GLORYS / Copernicus, OISST / NOAA ERDDAP, GEBCO, NCEI, MODIS, VIIRS; or any geospatial workflow involving sf / terra / stars / leaflet for marine and coastal extents. Pairs with the SDM Specialist for any modelling consumer, and with the Quantitative Scientist for integration into statistical workflows.","title":"Geospatial and Environmental Data Specialist: Agent Definition","summary":"You are a marine geospatial data scientist with operational experience across the major oceanographic and remote-sensing data products. You think in terms of **product characteristics** (spatial and temporal resolution, accuracy, latency, vertical layers, known biases) before...","size_bytes":8300,"mtime":"2026-05-27T01:37:12.772Z"},{"name":"lab-director","file":"lab-director.md","path":"agents/lab-director.md","frontmatter_name":"lab-director","description":"Coordinator that routes research tasks to specialist sub-agents and integrates cross-domain results. Use when a request spans multiple domains (e.g. two distinct subfields, or analysis plus writing) or when it is unclear which specialist to invoke. Knows the full agent roster and the Quantitative Scientist rule.","title":"Lab Director: Agent Definition","summary":"You are the principal investigator overseeing a research lab with specialist team members. You understand the big picture of each project, know each specialist's strengths, and ensure work is coordinated and high-quality. You do not do the domain work yourself: you delegate to...","size_bytes":12514,"mtime":"2026-05-27T01:16:38.235Z"},{"name":"literature-extractor","file":"literature-extractor.md","path":"agents/literature-extractor.md","frontmatter_name":"literature-extractor","description":"Verbatim quantitative extraction from PDFs, APIs, HTML, and supplementary datasets, with full provenance. Use when pulling specific numerical values out of papers (parameter-extraction workflows, manuscript fact-checking, reviewer-reply citation auditing).","title":"Literature Extractor: Agent Definition","summary":"You are a scientific data extraction specialist. You read source documents carefully, extract quantitative values that can be traced back to a specific quote, page, API field, or cell address, and you do not synthesise, interpret, or paraphrase beyond what the source explicitl...","size_bytes":15567,"mtime":"2026-05-27T01:16:38.235Z"},{"name":"movement-ecology-specialist","file":"movement-ecology-specialist.md","path":"agents/movement-ecology-specialist.md","frontmatter_name":"movement-ecology-specialist","description":"Subject expert for movement-ecology analysis of marine and aquatic taxa, including home range, utilisation distributions, state-space models, hidden Markov models (HMMs), step-selection functions, network analyses, and migratory connectivity. Use whenever a request involves analytical inference about how animals move through space and time, including residency vs transit classification, home-range estimation, behavioural-state segmentation, and population-level connectivity. Always paired with the Quantitative Scientist for model implementation.","title":"Movement Ecology Specialist: Agent Definition","summary":"You are a movement ecologist with strong expertise in the methods that translate raw location or detection data into inference about animal behaviour and ecology. You think in terms of the **movescape** (the spatial-environmental backdrop), the **movement process** (the data-g...","size_bytes":7954,"mtime":"2026-05-27T01:34:26.933Z"},{"name":"quantitative-scientist","file":"quantitative-scientist.md","path":"agents/quantitative-scientist.md","frontmatter_name":"quantitative-scientist","description":"Statistical modelling, GLMM/GAM/hurdle model selection, code, diagnostics, visualisation review. Use PROACTIVELY whenever a task involves data analysis, model fitting, or numerical results, even when a domain specialist is leading. Implements the Quantitative Scientist rule from `agents/lab-director.md`.","title":"Quantitative Scientist: Agent Definition","summary":"You are a quantitative scientist with deep expertise in statistical modelling, machine learning, and computational methods applied to research data. You think in terms of data structures, distributions, and model assumptions. You bridge the gap between statistical theory and d...","size_bytes":8912,"mtime":"2026-05-27T01:16:38.235Z"},{"name":"science-writer","file":"science-writer.md","path":"agents/science-writer.md","frontmatter_name":"science-writer","description":"Literature research, manuscript drafting, expert and peer review simulation, scientific communication. Use for writing, revising, or critically reviewing scientific prose (manuscripts, reports, replies, syntheses).","title":"Science Writer: Agent Definition","summary":"You are a scientific writer who produces publication-quality manuscripts, reports, and syntheses. You write in the lab's voice: direct, technically precise, with strong topic sentences and clear paragraph structure. You never pad with filler. You integrate citations naturally...","size_bytes":5222,"mtime":"2026-05-27T01:16:38.235Z"},{"name":"species-distribution-modelling-specialist","file":"species-distribution-modelling-specialist.md","path":"agents/species-distribution-modelling-specialist.md","frontmatter_name":"species-distribution-modelling-specialist","description":"Subject expert for species distribution modelling (SDM) and integrated SDM workflows in marine and aquatic systems, especially INLA-SPDE / inlabru frameworks (Farchadi-style iSDM), boosted regression trees, and ensemble approaches with marine environmental covariates (SST, SSS, bathymetry, chlorophyll, mixed-layer depth). Use whenever a request involves predicting species distributions from telemetry, mark-recapture, or presence-only data; integrating multiple data streams; building or critiquing a habitat or distribution model; or interpreting niche dynamics under environmental change. Always paired with the Quantitative Scientist and (when telemetry-derived) the Acoustic Telemetry Specialist.","title":"Species Distribution Modelling Specialist: Agent Definition","summary":"You are an applied quantitative ecologist focused on species distribution and habitat modelling in marine systems. You work in the INLA-SPDE / `inlabru` family for spatial models because you have found Farchadi-style integrated SDMs (Farchadi et al. 2025 BlueShark framework, t...","size_bytes":9413,"mtime":"2026-05-27T01:36:19.110Z"}],"templates":[{"name":"domain-specialist","file":"_domain-specialist.template.md","path":"agents/_domain-specialist.template.md","frontmatter_name":"_domain-specialist-template","description":"TEMPLATE for instantiating a domain-specialist sub-agent. Copy this file to `agents/<your-specialist-name>.md`, replace every `[adopter: ...]` slot, and update the frontmatter `name` and `description` fields. Do NOT invoke this template directly; the Lab Director routes work to instantiated specialists, not to the template.","title":"Domain Specialist: Template","summary":"A domain specialist is a subject-matter expert sub-agent. It is invoked by the Lab Director when a re "Habitat- and distribution-modelling methods for marine fishes, with the Griffin Lab's working preference for INLA-SPDE / inlabru integrated SDMs (Farchadi-style) that combine multiple data streams with shared latent ecological fields and dataset-specific intercepts. Scope cove...","mtime":"2026-05-27T01:42:04.139Z"}],"templates":[{"slug":"_topic.template","path":"knowledge_base/_topic.template","has_index":true,"article_count":0,"file_count":2,"title":"Topic: <Topic name>","summary":"Two to three sentences describing what this topic covers, why it matters for the lab's research, and where its boundaries sit. The overview should make it clear when a new piece of literature belongs in this topic rather than a neighbouring one.","mtime":"2026-05-27T01:16:38.237Z"}]},"conventions":[{"name":"code-format","kind":"template-populated","populated":true,"template_path":"conventions/code-format.template.md","populated_path":"conventions/code-format.md","title":"Code format: Griffin Lab project structure and coding conventions","summary":"The lab is R-dominant with selective Python use (e.g., `build_pptx.py` utilities, occasional Jupyter for data exploration). Code is organised around numbered analysis scripts driven by a single config file. The conventions below describe the working pattern; deviation is fine...","size_bytes":12066,"mtime":"2026-05-27T01:31:36.175Z"},{"name":"figure-format","kind":"template-populated","populated":true,"template_path":"conventions/figure-format.template.md","populated_path":"conventions/figure-format.md","title":"Figure format: Griffin Lab plotting and visualisation conventions","summary":"Render-time companion to `conventions/manuscript-format.md`. Manuscript-format specifies how many figures and how legends are structured; this file specifies how each figure is rendered: tooling, palette, typography, panel labelling, scale bars, export format.","size_bytes":9638,"mtime":"2026-05-27T01:32:33.007Z"},{"name":"goal-spec","kind":"template-only","populated":false,"template_path":"conventions/goal-spec.template.md","populated_path":null,"title":"Goal-spec template: Per-project endpoint definition","summary":"Every `research-iterate` invocation produces a `project-goal-spec.md` in the project's `.iterate/` directory. This document is the loop's exit condition: the iteration terminates when all applicable acceptance criteria pass. It is read by the Lab Director in Phase 0 (drafted),...","size_bytes":6991,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"iteration-workflow","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/iteration-workflow.md","title":"Iteration Workflow: Research Loop to Publication Quality","summary":"Defines the six-phase orchestration loop invoked by `skills/workflows/research-iterate/SKILL.md`. Any analysis that is to reach publication quality runs through this loop. The loop is owned by the Lab Director agent; specialists are dispatched in parallel per phase.","size_bytes":7446,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"manuscript-format","kind":"template-populated","populated":true,"template_path":"conventions/manuscript-format.template.md","populated_path":"conventions/manuscript-format.md","title":"Manuscript format: Griffin Lab manuscript conventions","summary":"This file encodes document-level architecture: section structure, citation density, length targets, figure-to-result pairing, and journal-specific defaults. Voice (`conventions/voice.md`) handles sentence-level register; this file handles document architecture.","size_bytes":12740,"mtime":"2026-05-27T01:29:35.853Z"},{"name":"readiness-assessment","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/readiness-assessment.md","title":"Readiness Assessment: Phase 0 System-Fitness Check","summary":"Before the iteration loop starts, Lab Director confirms that the system (knowledge base, agents, skills) has the expertise required for the project. Gaps are proposed as fills BEFORE Phase 1. This prevents the loop from running in circles on work the system is not equipped to do.","size_bytes":5008,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"reply-format","kind":"template-populated","populated":true,"template_path":"conventions/reply-format.template.md","populated_path":"conventions/reply-format.md","title":"Reply format: Griffin Lab reviewer-reply conventions","summary":"This file is a **delta** on `conventions/voice.md` and `conventions/manuscript-format.md`. Use this file when drafting a response-to-reviewers document or a proposal-resubmission narrative that addresses prior panel comments.","size_bytes":11087,"mtime":"2026-05-27T01:30:26.746Z"},{"name":"research","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/research.md","title":"Research: Source Faithfulness, Citation, and Integrity Contract","summary":"This file applies universally: - Manuscript writing (literature reviews, citations) - Topic writing (syntheses, briefs, perspectives) - Reviewer replies (when ADD-CITE or DEFEND comments need literature support) - Knowledge base ingestion (must be source-faithful) - Domain-spe...","size_bytes":16023,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"research-quality-gates","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/research-quality-gates.md","title":"Research Quality Gates: Convergence Criteria for Publication-Ready Work","summary":"Defines the checklist the Lab Director evaluates each round of `conventions/iteration-workflow.md` to decide whether work is publication-ready. Each project's goal spec (`.iterate/project-goal-spec.md`) selects which gates apply; waived gates must carry written justification.","size_bytes":7273,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"research-quality-gates-lab-overrides","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/research-quality-gates-lab-overrides.md","title":"Research Quality Gates: Griffin Lab overrides","summary":"This file is a delta on `conventions/research-quality-gates.md` (the framework default). It renames or refines specific gates to match the lab's domain language and adds taxon- specific criteria. The base file is unchanged; this addendum is consulted alongside it.","size_bytes":4121,"mtime":"2026-05-27T01:43:16.756Z"},{"name":"system-improvement-protocol","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/system-improvement-protocol.md","title":"System Improvement Protocol: Self-Update Mechanism","summary":"As the research-iterate loop runs, agents encounter system gaps: a missing knowledge base article, an unclear skill step, a routing error, a visualization rule that should be in the protocol, a quality gate that needs tightening. This protocol channels those observations into...","size_bytes":9652,"mtime":"2026-05-27T01:16:38.236Z"},{"name":"visual-review-protocol","kind":"opinionated","populated":true,"template_path":null,"populated_path":"conventions/visual-review-protocol.md","title":"Visual Review Protocol: Render-and-Read","summary":"Figures that \"work\" in code often fail to communicate to a human reader. This protocol enforces a review step where the agent actually reads the rendered image (not just the code) and judges it by what a reader sees.","size_bytes":9058,"mtime":"2026-05-27T01:16:38.237Z"},{"name":"voice","kind":"template-populated","populated":true,"template_path":"conventions/voice.template.md","populated_path":"conventions/voice.md","title":"Voice: Griffin Lab writing conventions","summary":"The Griffin Lab works in marine ecology, fisheries science, and movement ecology. The voice below is the same voice used in the lab's manuscripts and proposals, calibrated across a corpus of 21+ peer-reviewed publications (2017-2025) and 25+ proposals across NOAA, USGS, DoD, N...","size_bytes":12609,"mtime":"2026-05-27T01:28:28.819Z"}],"setup":{"prompts":[{"na <script>
(function () {
  'use strict';

  // -------------------------------------------------------------------------
  // Utilities
  // -------------------------------------------------------------------------

  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k of Object.keys(attrs)) {
        if (k === 'class') node.className = attrs[k];
        else if (k === 'html') node.innerHTML = attrs[k];
        else if (k === 'text') node.textContent = attrs[k];
        else if (k.startsWith('on') && typeof attrs[k] === 'function') {
          node.addEventListener(k.slice(2), attrs[k]);
        } else if (attrs[k] != null) {
          node.setAttribute(k, attrs[k]);
        }
      }
    }
    if (children) {
      const arr = Array.isArray(children) ? children : [children];
      for (const c of arr) {
        if (c == null) continue;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
    }
    return node;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toISOString().slice(0, 10);
  }

  function fmtBytes(n) {
    if (n == null) return '';
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / 1024 / 1024).toFixed(1) + ' MB';
  }

  function pct(num, denom) {
    if (!denom) return 0;
    return Math.round((num / denom) * 100);
  }

  function statCard(num, label, sub) {
    return el('div', { class: 'stat-card' }, [
      el('div', { class: 'num', text: String(num) }),
      el('div', { class: 'label', text: label }),
      sub ? el('div', { class: 'sub', text: sub }) : null
    ]);
  }

  function badge(text, kind) {
    return el('span', { class: 'badge ' + (kind || 'idle'), text });
  }

  function setActiveTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.panel === name);
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('active', p.id === 'panel-' + name);
    });
  }

  document.getElementById('tabs').addEventListener('click', function (e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    setActiveTab(btn.dataset.panel);
  });

  // -------------------------------------------------------------------------
  // Renderers
  // -------------------------------------------------------------------------

  function renderHeader(state) {
    document.getElementById('title').textContent =
      (state.framework && state.framework.name) || 'lab-skills-framework dashboard';
    const sub = document.getElementById('subtitle');
    sub.textContent =
      (state.framework && state.framework.status) ||
      'Reference framework for hybrid digital labs.';
    const meta = document.getElementById('meta');
    meta.innerHTML = '';
    if (state.framework && state.framework.version) {
      meta.appendChild(el('span', { html: '<b>' + state.framework.version + '</b>' }));
    }
    meta.appendChild(el('span', { html: 'Generated <b>' + fmtDate(state.generated) + '</b>' }));
    meta.appendChild(el('span', { html: '<b>' + state.totals.skills + '</b> skills' }));
    meta.appendChild(el('span', { html: '<b>' + state.totals.agents_core + '</b> agents' }));
    meta.appendChild(el('span', { html: '<b>' + state.totals.kb_topics + '</b> KB topics' }));
    meta.appendChild(el('span', {
      html: '<b>' + state.totals.conventions_populated + '/' +
            state.totals.conventions_total + '</b> conventions populated'
    }));
  }

  function renderOverview(state) {
    const root = document.getElementById('panel-overview');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Overview' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'The framework is a vendor-neutral scaffold. Skills define workflows; ' +
            'agents define specialist personas; conventions encode lab voice and ' +
            'format rules; the knowledge base is the lab\'s accumulated thinking.'
    }));

    const grid = el('div', { class: 'stat-grid' });
    grid.appendChild(statCard(state.totals.skills, 'Skills total',
      state.totals.skills_simple + ' simple, ' + state.totals.skills_workflows + ' workflow'));
    grid.appendChild(statCard(state.totals.agents_core, 'Agents',
      state.totals.agents_templates ? state.totals.agents_templates + ' templates' : 'core roster'));
    grid.appendChild(statCard(state.totals.kb_topics, 'KB topics',
      state.totals.kb_articles + ' articles, ' + state.totals.kb_topic_templates + ' template(s)'));
    grid.appendChild(statCard(
      state.totals.conventions_populated + '/' + state.totals.conventions_total,
      'Conventions filled',
      pct(state.totals.conventions_populated, state.totals.conventions_total) + '% populated'
    ));
    grid.appendChild(statCard(state.totals.setup_prompts, 'Setup prompts',
      state.totals.setup_prompts ? 'onboarding scripts' : 'none yet'));
    root.appendChild(grid);

    root.appendChild(el('h3', { text: 'Adopter checklist' }));
    const checklist = el('table', { class: 'simple' });
    checklist.appendChild(el('thead', {}, el('tr', {}, [
      el('th', { text: 'Step' }),
      el('th', { text: 'Status' }),
      el('th', { text: 'Notes' })
    ])));
    const tbody = el('tbody');
    const steps = [
      {
        step: 'Skills installed',
        done: state.totals.skills > 0,
        notes: state.totals.skills + ' skill definition(s) present'
      },
      {
        step: 'Agent roster scaffolded',
        done: state.totals.agents_core > 0,
        notes: state.totals.agents_core + ' core agent(s); add domain specialists as needed'
      },
      {
        step: 'Conventions populated',
        done: state.totals.conventions_populated === state.totals.conventions_total &&
              state.totals.conventions_total > 0,
        notes: state.totals.conventions_template_only +
               ' template(s) still need a populated copy'
      },
      {
        step: 'Knowledge base seeded',
        done: state.totals.kb_topics > 0,
        notes: state.totals.kb_topics + ' topic folder(s); template scaffold available'
      },
      {
        step: 'Setup prompts available',
        done: state.totals.setup_prompts > 0,
        notes: state.totals.setup_prompts + ' onboarding prompt(s)'
      }
    ];
    for (const s of steps) {
      tbody.appendChild(el('tr', {}, [
        el('td', { text: s.step }),
        el('td', {}, badge(s.done ? 'Done' : 'Pending', s.done ? 'good' : 'warn')),
        el('td', { text: s.notes })
      ]));
    }
    checklist.appendChild(tbody);
    root.appendChild(checklist);
  }

  function renderSkillCategory(title, list, container) {
    container.appendChild(el('h3', { text: title + ' (' + list.length + ')' }));
    if (!list.length) {
      container.appendChild(el('div', { class: 'empty', text: 'No skills in this category.' }));
      return;
    }
    const grid = el('div', { class: 'card-grid' });
    for (const sk of list) {
      const card = el('div', { class: 'item' });
      card.appendChild(el('div', { class: 'top' }, [
        el('span', { class: 'name', text: sk.name }),
        badge(sk.category, 'accent')
      ]));
      if (sk.summary || sk.description) {
        card.appendChild(el('div', { class: 'summary',
          text: sk.summary || sk.description }));
      }
      card.appendChild(el('div', { class: 'meta' }, [
        el('span', { class: 'path', text: sk.path }),
        el('span', { text: fmtDate(sk.mtime) })
      ]));
      grid.appendChild(card);
    }
    container.appendChild(grid);
  }

  function renderSkills(state) {
    const root = document.getElementById('panel-skills');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Skills' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'Simple skills cover a single phase of work. Workflow skills orchestrate ' +
            'multiple simple skills through a checkpointed pipeline.'
    }));
    renderSkillCategory('Workflows', state.skills.workflows, root);
    renderSkillCategory('Simple skills', state.skills.simple, root);
  }

  function renderAgents(state) {
    const root = document.getElementById('panel-agents');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Agents' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'Specialist personas the framework can route work to. The Lab Director ' +
            'is the first responder and dispatches to the right specialist(s).'
    }));

    if (!state.agents.core.length) {
      root.appendChild(el('div', { class: 'empty', text: 'No agents found.' }));
    } else {
      const grid = el('div', { class: 'card-grid' });
      for (const ag of state.agents.core) {
        const card = el('div', { class: 'item' });
        card.appendChild(el('div', { class: 'top' }, [
          el('span', { class: 'title', text: ag.title || ag.frontmatter_name || ag.name }),
          ag.frontmatter_name ? badge(ag.frontmatter_name, 'accent') : null
        ]));
        if (ag.description || ag.summary) {
          card.appendChild(el('div', { class: 'summary',
            text: ag.description || ag.summary }));
        }
        card.appendChild(el('div', { class: 'meta' }, [
          el('span', { class: 'path', text: ag.path }),
          el('span', { text: fmtBytes(ag.size_bytes) }),
          el('span', { text: fmtDate(ag.mtime) })
        ]));
        grid.appendChild(card);
      }
      root.appendChild(grid);
    }

    if (state.agents.templates && state.agents.templates.length) {
      root.appendChild(el('h3', { text: 'Templates' }));
      const grid = el('div', { class: 'card-grid' });
      for (const ag of state.agents.templates) {
        const card = el('div', { class: 'item' });
        card.appendChild(el('div', { class: 'top' }, [
          el('span', { class: 'title', text: ag.title || ag.name }),
          badge('template', 'idle')
        ]));
        if (ag.summary) card.appendChild(el('div', { class: 'summary', text: ag.summary }));
        card.appendChild(el('div', { class: 'meta' }, [
          el('span', { class: 'path', text: ag.path })
        ]));
        grid.appendChild(card);
      }
      root.appendChild(grid);
    }
  }

  function renderKB(state) {
    const root = document.getElementById('panel-kb');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Knowledge base' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'Topic folders containing the lab\'s compiled thinking. Each topic has ' +
            'an INDEX.md and an articles/ subfolder. Template folders (prefixed _) ' +
            'show the structure; populate them with topics relevant to your lab.'
    }));

    if (!state.knowledge_base.topics.length && !state.knowledge_base.templates.length) {
      root.appendChild(el('div', { class: 'empty', text: 'No knowledge-base content yet.' }));
      return;
    }

    if (state.knowledge_base.topics.length) {
      root.appendChild(el('h3', { text: 'Topics' }));
      const grid = el('div', { class: 'card-grid' });
      for (const t of state.knowledge_base.topics) {
        const card = el('div', { class: 'item' });
        card.appendChild(el('div', { class: 'top' }, [
          el('span', { class: 'name', text: t.slug }),
          badge(t.article_count + ' article' + (t.article_count === 1 ? '' : 's'),
                t.article_count ? 'good' : 'idle'),
          t.has_index ? badge('index', 'accent') : badge('no index', 'warn')
        ]));
        if (t.summary) card.appendChild(el('div', { class: 'summary', text: t.summary }));
        card.appendChild(el('div', { class: 'meta' }, [
          el('span', { class: 'path', text: t.path }),
          el('span', { text: fmtDate(t.mtime) })
        ]));
        grid.appendChild(card);
      }
      root.appendChild(grid);
    }

    if (state.knowledge_base.templates.length) {
      root.appendChild(el('h3', { text: 'Templates' }));
      const grid = el('div', { class: 'card-grid' });
      for (const t of state.knowledge_base.templates) {
        const card = el('div', { class: 'item' });
        card.appendChild(el('div', { class: 'top' }, [
          el('span', { class: 'name', text: t.slug }),
          badge('template', 'idle')
        ]));
        card.appendChild(el('div', { class: 'summary',
          text: 'Scaffold for a knowledge-base topic. Copy and rename to add a topic.' }));
        card.appendChild(el('div', { class: 'meta' }, [
          el('span', { class: 'path', text: t.path })
        ]));
        grid.appendChild(card);
      }
      root.appendChild(grid);
    }
  }

  function renderConventions(state) {
    const root = document.getElementById('panel-conventions');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Conventions' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'Voice, format, and research-integrity rules loaded by every skill that ' +
            'produces written output. Templates (.template.md) ship as scaffolds; ' +
            'each one needs a populated sibling (.md) for adoption to be complete.'
    }));

    if (!state.conventions.length) {
      root.appendChild(el('div', { class: 'empty', text: 'No conventions found.' }));
      return;
    }

    const populated = state.conventions.filter(c => c.populated);
    const pending = state.conventions.filter(c => !c.populated);

    const summary = el('div', { class: 'stat-grid' });
    summary.appendChild(statCard(populated.length, 'Populated',
      pct(populated.length, state.conventions.length) + '% of total'));
    summary.appendChild(statCard(pending.length, 'Template-only',
      pending.length ? 'awaiting adopter content' : 'none pending'));
    root.appendChild(summary);

    root.appendChild(el('h3', { text: 'All conventions' }));
    const table = el('table', { class: 'simple' });
    table.appendChild(el('thead', {}, el('tr', {}, [
      el('th', { text: 'Name' }),
      el('th', { text: 'Status' }),
      el('th', { text: 'Title' }),
      el('th', { text: 'Path' }),
      el('th', { text: 'Updated' })
    ])));
    const tbody = el('tbody');
    for (const c of state.conventions) {
      let statusBadge;
      if (c.kind === 'opinionated') statusBadge = badge('suggested', 'good');
      else if (c.kind === 'template-populated') statusBadge = badge('populated', 'good');
      else statusBadge = badge('template only', 'warn');
      tbody.appendChild(el('tr', {}, [
        el('td', { text: c.name }),
        el('td', {}, statusBadge),
        el('td', { text: c.title || '' }),
        el('td', { class: 'path',
          text: c.populated_path || c.template_path || '' }),
        el('td', { text: fmtDate(c.mtime) })
      ]));
    }
    table.appendChild(tbody);
    root.appendChild(table);
  }

  function renderSetup(state) {
    const root = document.getElementById('panel-setup');
    root.innerHTML = '';
    root.appendChild(el('h2', { text: 'Setup' }));
    root.appendChild(el('p', {
      class: 'lead',
      text: 'Onboarding prompts under setup/prompts/ guide an adopter through ' +
            'populating the framework for their lab.'
    }));

    const prompts = (state.setup && state.setup.prompts) || [];
    if (!prompts.length) {
      root.appendChild(el('div', { class: 'empty', text: 'No setup prompts yet.' }));
    } else {
      const grid = el('div', { class: 'card-grid' });
      for (const p of prompts) {
        const card = el('div', { class: 'item' });
        card.appendChild(el('div', { class: 'top' }, [
          el('span', { class: 'name', text: p.name })
        ]));
        if (p.summary) card.appendChild(el('div', { class: 'summary', text: p.summary }));
        card.appendChild(el('div', { class: 'meta' }, [
          el('span', { class: 'path', text: p.path })
        ]));
        grid.appendChild(card);
      }
      root.appendChild(grid);
    }

    root.appendChild(el('h3', { text: 'Populated conventions' }));
    const populated = (state.setup && state.setup.populated_conventions) || [];
    if (!populated.length) {
      root.appendChild(el('div', { class: 'empty',
        text: 'No populated conventions yet. Copy each .template.md to a .md sibling and fill in.' }));
    } else {
      const list = el('div', { class: 'card-grid' });
      for (const name of populated) {
        list.appendChild(el('div', { class: 'item' }, [
          el('div', { class: 'top' }, [
            el('span', { class: 'name', text: name }),
            badge('populated', 'good')
          ])
        ]));
      }
      root.appendChild(list);
    }
  }

  // -------------------------------------------------------------------------
  // Load
  // -------------------------------------------------------------------------

  function showError(msg) {
    document.getElementById('panel-overview').innerHTML = '';
    document.getElementById('panel-overview').appendChild(
      el('div', { class: 'error', text: msg })
    );
  }

  function bootstrap(state) {
    renderHeader(state);
    renderOverview(state);
    renderSkills(state);
    renderAgents(state);
    renderKB(state);
    renderConventions(state);
    renderSetup(state);
  }

  function loadInlineState() {
    const el = document.getElementById('state');
    if (!el) return null;
    const text = (el.textContent || '').trim();
    if (!text || text === '{}') return null;
    try {
      return JSON.parse(text);
    } catch (e) {
      return null;
    }
  }

  const inline = loadInlineState();
  if (inline) {
    bootstrap(inline);
  } else {
    fetch('./system-state.json', { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching system-state.json');
        return r.json();
      })
      .then(bootstrap)
      .catch(err => {
        const msg = 'Could not load system-state.json. ' +
          'Run "node tools/generate-state.js" from the framework root, then reload. ' +
          'If you are viewing this file via file://, some browsers block fetch() of ' +
          'local files; serve the tools/ directory over HTTP (e.g. "python3 -m http.server" ' +
          'from the framework root, then open http://localhost:8000/tools/system-dashboard.html). ' +
          'Underlying error: ' + err.message;
        showError(msg);
      });
  }
})();
</script>

</body>
</html>
